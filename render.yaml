services:
  - type: web
    name: docucorex-conversion-worker
    runtime: docker
    plan: starter
    dockerContext: .
    dockerfilePath: ./workers/conversion_worker/Dockerfile
    healthCheckPath: /api/conversion-worker/health
    envVars:
      - key: CONVERSION_WORKER_MODE
        value: "true"
      - key: CONVERSION_WORKER_SECRET
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false

  # pdfplumber extraction service used by the multi-parser pipeline (lib/pdf).
  # After deploy, set PDF_PLUMBER_URL on the Vercel app to this service's URL.
  - type: web
    name: docucorex-pdf-plumber
    runtime: python
    plan: starter
    rootDir: services/pdf-plumber
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
